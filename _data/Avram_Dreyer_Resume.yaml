        start_date: "2020-09"
        end_date: "2025-06"
        location: "Teterboro, NJ"
        highlights:
          - "**GPA: 3.99/4.0;** National Honor Society, High Honor Roll,
            Departmental Award for Physics"
 
    projects:
      - name: "Satellite Thermal Heatsink"
        start_date: "2024-09"
        end_date: "2025-04"
        location: "Houston, TX"
        highlights:
          - "Collaborated to design and build a novel thermal management system for a 1U CubeSat satellite."
          - "Designed in Fusion360 and thermal analysis with ANSYS Mechanical. Fabricated using custom brass plates and pipes."
          - "Selected as one of five finalist teams in the nation for the NASA HUNCH space hardware design competition."
          - "Presented at Johson Space Center to NASA engineers for potential implementation in flight hardware."
    technical_experience:
      - company: Cornell Autonomous Sailboat Team
        position: Mechanical Subteam Member
        start_date: "2026-02"
        location: Ithaca, NY
        summary: "Student Project Team at Cornell University competing in the SailBot International Robotic Sailing Regatta (IRSR)"
        highlights:
          - "Fabricated a five foot long hull using a fiberglass and resin composite layup."
          - "Designed and built sail rigging using Solidworks and 3D printed PLA."
      - company: "Camp Wigwam For Boys"
        position: "Sailing and STEM Instructor"
        start_date: "2025-06"
        end_date: "2025-08"
        location: "Waterford, ME"
        highlights:
          - "Led and mentored a bunk of campers while managing an activity area."
          - "Educated kids in model rocketry and other STEM projects."
          - "Assisted in the successful construction and launch of a
            high-powered I-engine model rocket."
    research_experience:
      - company: Cornell University
        position: ZT Group
        start_date: "2026-03"
        location: Ithaca, NY
        summary: "Research group at Cornell University led by Professor Zhiting Tian, studying nanoscale thermal transport techniques."
        highlights:
          - "Investigated the use of nanoscale thermal switches with applications in semiconductor electronics and aerospace."
      - company: "Stevens Institute of Technology"
        position: "Parziale Group"
        start_date: "2024-09"
        end_date: "2025-06"
        location: "Hoboken, NJ"
        summary: "Research group at Stevens Institute of Technology studying hypersonic fluid flow at speeds above Mach 5."
        highlights:
          - "Interned under Professor Nicholaus Parziale’s research group,
            conducting hypersonic fluid dynamics research."
          - "Studied hypersonic boundary layers using Krypton Tagging
            Velocimetry (KTV) in the Mach 6 Stevens Shock Tunnel."
          - "Contributed to graduate-level fluid dynamics research for the US
            Navy Office of Naval Research (ONR)."
    skills_and_interests:
      - label: "Programs"
        details: "Python, Autodesk Fusion 360, Autodesk Inventor, MATLAB, ANSYS
