<aside class="sidebar">
  <div class="sidebar-inner">

    <div class="sidebar-header">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      {% if site.description %}
        <p class="site-tagline">{{ site.description }}</p>
      {% endif %}
    </div>

    <nav class="sidebar-nav" aria-label="Main navigation">
      <ul>
        {% for link in site.nav_links %}
          <li>
            <a href="{{ link.url | relative_url }}"
               class="nav-link{% if page.url == link.url %} active{% endif %}">
              {{ link.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>

    <div class="sidebar-footer">
      {% if site.author.email %}
        <a href="mailto:{{ site.author.email }}" class="contact-link"><i class="fa-solid fa-envelope fa-xl"></i></a>
      {% endif %}
      {% if site.author.linkedin %}
        <a href="{{ site.author.linkedin }}" class="contact-link" target="_blank" rel="noopener"><i class="fa-brands fa-linkedin fa-xl"></i></a>
      {% endif %}
      {% if site.author.github %}
        <a href="{{ site.author.github }}" class="contact-link" target="_blank" rel="noopener"><i class="fa-brands fa-github fa-xl"></i></a>
      {% endif %}
    </div>

  </div>

  <!-- Mobile hamburger toggle -->
  <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</aside>
