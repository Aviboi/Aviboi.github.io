design:
  theme: engineeringresumes

  page:
    size: us-letter
    top_margin: 2cm
    bottom_margin: 2cm
    left_margin: 2cm
    right_margin: 2cm
    show_footer: false

  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)

  typography:
    font_family:
      body: XCharter
      name: XCharter
      connections: XCharter
      section_titles: XCharter
    font_size:
      body: 10pt
      name: 25pt
      section_titles: 1.2em
    bold:
      name: false
      section_titles: true
    small_caps:
      name: false
      section_titles: false
    line_spacing: 0.6em
    alignment: justified
    date_and_location_column_alignment: right

  links:
    underline: true
    show_external_link_icon: false

  header:
    alignment: center
    photo_width: 3.5cm
    space_below_name: 0.7cm
    space_below_connections: 0.7cm
    connections:
      display_urls_instead_of_usernames: true
      separator: "|"
      space_between_connections: 0.5cm
      show_icons: false
      hyperlink: true

  section_titles:
    type: with_full_line
    line_thickness: 0.5pt
    space_above: 0.55cm
    space_below: 0.3cm

  entries:
    date_and_location_width: 4.15cm
    space_between_columns: 0.1cm
    side_space: 0cm
    allow_page_break: true
    short_second_row: false
    highlights:
      bullet: "•"
      nested_bullet: "-"
      space_above: 0.25cm
      space_left: 0cm
      space_between_items: 0.19cm
      space_between_bullet_and_text: 0.3em
    summary:
      space_above: 0cm
      space_left: 0cm

  sections:
    allow_page_break: true

  templates:
    one_line_entry:
      main_column: "**LABEL:** DETAILS"
    education_entry:
      main_column: |-
        **INSTITUTION**, DEGREE in AREA -- LOCATION
        SUMMARY
        HIGHLIGHTS
      degree_column:
      date_and_location_column: DATE
    normal_entry:
      main_column: |-
        **NAME** -- **LOCATION**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        **POSITION**, COMPANY -- LOCATION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    publication_entry:
      main_column: |-
        **TITLE**
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE

locale:
  language: english
  month: month
  months: months
  year: year
  years: years
  present: present