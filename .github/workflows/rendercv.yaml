name: Build CV

on:
  push:
    paths:
      - 'cv/cv.yaml'        # only runs when you edit the CV
  workflow_dispatch:         # also lets you trigger it manually

jobs:
  build-cv:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit the output back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Ensure locales
        run: |
          sudo apt-get update
          sudo apt-get install -y locales
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8
          export LANG=en_US.UTF-8
          export LANGUAGE=en_US:en
          export LC_ALL=en_US.UTF-8
        
      - name: Install RenderCV
        run: pip install "rendercv[full]"

      - name: Build CV
        run: |
          set -eux
          rendercv render cv/cv.yaml --output-folder output

      - name: Process CV HTML for Jekyll
        run: |
          HTML_FILE=$(find . -name "*_CV.html" -path "*/output/*" | head -1)
          echo "Found HTML: $HTML_FILE"
          python3 cv/process_cv.py "$HTML_FILE" cv/index.html
      - name: Copy PDF to assets
        run: |
          mkdir -p assets/files
          PDF_FILE=$(find . -name "*_CV.pdf" -path "*/output/*" | head -1)
          echo "Found PDF: $PDF_FILE"
          cp "$PDF_FILE" assets/files/cv.pdf

      - name: Commit generated files
        run: |
          set -eux
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f cv/index.html assets/files/cv.pdf cv/output/
          git diff --staged --quiet || git commit -m "chore: rebuild CV"
          git push
