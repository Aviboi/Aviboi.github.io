name: Render and Deploy CV

on:
  push:
    branches: [main]          # run on every push to main
  workflow_dispatch:          # also allow manual runs from the Actions tab

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render:
    name: Render CV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install RenderCV
        run: pip install -r requirements.txt

      - name: Render CV
        run: |
          rendercv render "_data/Avram_Dreyer_Resume.yaml" \
            --pdf-path "resume/resume.pdf" \
            --typst-path "resume/resume.typ" \
            --dont-generate-png

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: resume/

  deploy:
    name: Deploy to GitHub Pages
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4