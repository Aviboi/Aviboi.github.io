name: Render and Deploy CV

on:
  push:
    branches: [main]
    paths:
      - "_data/Avram_Dreyer_Resume.yaml"
      - "requirements.txt"
      - ".github/workflows/render.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    name: Render CV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install RenderCV
        run: pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p resume

      - name: Install Typst
        run: |
          curl -fsSL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
            | tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst
      - name: Render CV
        run: |
          rendercv render "_data/Avram_Dreyer_Resume.yaml" \
            --pdf-path "resume/resume.pdf" \
            --typst-path "resume/resume.typ" \
            --dont-generate-png

      - name: Commit rendered CV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume/resume.pdf resume/resume.typ
          git diff --staged --quiet || git commit -m "chore: re-render CV [skip ci]"
          git push